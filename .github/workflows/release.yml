name: Create New Release

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest # تم تصحيح نسخة النظام لضمان العمل
    steps:
      - name: Checkout
        uses: actions/checkout@v3
        with:
          submodules: recursive # تم التعديل لجلب IDeviceKitten و Zsign بشكل كامل
          fetch-depth: 0

      - name: Setup Xcode Version
        run: |
          # هذا الأمر سيبحث عن أحدث نسخة Xcode مستقرة متوفرة على السيرفر ويستخدمها
          sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      - name: Compile Feather
        run: | 
          # تأكد من وجود ملفات الـ Submodules قبل البدء
          git submodule update --init --recursive
          make
          mkdir -p upload
          # نقل ملفات الـ IPA الناتجة
          mv packages/*.ipa upload/ 2>/dev/null || echo "No IPA found"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: Feather Appmasster Release
          tag_name: v${{ github.run_number }}
          files: |
            upload/*.ipa
          generate_release_notes: true
          fail_on_unmatched_files: false
          draft: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}