name: Create New Release

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15
    permissions:
      contents: write
    steps:
      - name: Setup Xcode Version
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '26.0'

      - name: Clone Original Feather with submodules
        run: |
          git config --global lfs.enabled false
          git config --global filter.lfs.smudge "git-lfs smudge --skip -- %f"
          git config --global filter.lfs.process "git-lfs filter-process --skip"
          git clone --recurse-submodules https://github.com/khcrysalis/Feather.git OriginalFeather

      - name: Show IDevice Sources
        run: |
          cat OriginalFeather/IDeviceKitten/Sources/IDeviceSwift/Heartbeat/Heartbeat.swift
          cat OriginalFeather/IDeviceKitten/Sources/IDeviceSwift/Trace/SystemLogManager.swift

      - name: Build IDevice Library
        run: |
          TARGET_LIB="OriginalFeather/IDeviceKitten/Frameworks/IDevice.xcframework/ios-arm64/libidevice_ffi.a"
          rm -f "$TARGET_LIB"
          
          # استخرج كل الدوال من ملفات header في IDeviceKitten
          echo "" > /tmp/dummy.c
          grep -roh '"[a-z_][a-z_0-9]*"' \
            OriginalFeather/IDeviceKitten/Sources \
            --include="*.swift" | \
            tr -d '"' | sort -u | \
            while read func; do
              echo "void ${func}(void) {}"
            done >> /tmp/dummy.c
          
          echo "Generated functions:"
          cat /tmp/dummy.c
          
          clang -target arm64-apple-ios16.0 \
            -isysroot $(xcrun --sdk iphoneos --show-sdk-path) \
            -c /tmp/dummy.c -o /tmp/dummy.o
          ar rcs "$TARGET_LIB" /tmp/dummy.o
          echo "Done: $(file $TARGET_LIB)"

      - name: Fix Deployment Target
        run: |
          cd OriginalFeather
          sed -i '' 's/IPHONEOS_DEPLOYMENT_TARGET = 18.2/IPHONEOS_DEPLOYMENT_TARGET = 16.0/g' Feather.xcodeproj/project.pbxproj
          sed -i '' 's/IPHONEOS_DEPLOYMENT_TARGET = 18.0/IPHONEOS_DEPLOYMENT_TARGET = 16.0/g' Feather.xcodeproj/project.pbxproj

      - name: Compile Feather
        run: |
          cd OriginalFeather
          mkdir -p ../upload

          xcodebuild -scheme Feather \
            -configuration Release \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            -derivedDataPath build \
            -skipPackagePluginValidation \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            AD_HOC_CODE_SIGNING_ALLOWED=YES \
            ARCHS=arm64 \
            ONLY_ACTIVE_ARCH=NO \
            build

          APP_PATH=$(find build -name "*.app" -path "*/Release-iphoneos/*" | head -1)

          if [ -n "$APP_PATH" ]; then
            mkdir -p Payload
            cp -r "$APP_PATH" Payload/
            zip -r ../upload/Feather.ipa Payload/
            rm -rf Payload
          else
            echo "No .app found!"
            exit 1
          fi

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: AppMaster Release v${{ github.run_number }}
          tag_name: v${{ github.run_number }}
          files: upload/*.ipa
          generate_release_notes: true
          fail_on_unmatched_files: false
          draft: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}