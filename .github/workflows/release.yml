name: Create New Release

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15
    permissions:
      contents: write
    steps:
      - name: Setup Xcode Version
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '26.0'

      - name: Clone Original Feather with submodules
        run: |
          git config --global lfs.enabled false
          git config --global filter.lfs.smudge "git-lfs smudge --skip -- %f"
          git config --global filter.lfs.process "git-lfs filter-process --skip"
          git clone --recurse-submodules https://github.com/khcrysalis/Feather.git OriginalFeather

      - name: Build IDevice Library
        run: |
          TARGET_LIB="OriginalFeather/IDeviceKitten/Frameworks/IDevice.xcframework/ios-arm64/libidevice_ffi.a"
          rm -f "$TARGET_LIB"
          
          cat > /tmp/dummy.c << 'EOF'
          void idevice_init_logger(int level, int a, void* b) {}
          void idevice_string_free(void* s) {}
          void syslog_relay_connect_rsd(void* a, void* b, void** c) {}
          void syslog_relay_connect_tcp(void* a, void** b) {}
          void syslog_relay_next(void* a, void** b) {}
          void syslog_relay_client_free(void* a) {}
          void os_trace_relay_connect(void* a, void** b) {}
          void os_trace_relay_start_trace(void* a, void** b, void* c) {}
          void os_trace_relay_next(void* a, void** b) {}
          void os_trace_relay_free_log(void* a) {}
          void os_trace_relay_receiver_free(void* a) {}
          void tunnel_create_rppairing(void* a, void* b, void** c) {}
          void springboard_services_connect(void* a, void** b) {}
          void springboard_services_free(void* a) {}
          void springboard_services_get_icon(void* a, void* b, void** c, void** d) {}
          void instproxy_browse(void* a, void* b, void** c) {}
          void instproxy_install(void* a, void* b, void* c, void* d, void* e) {}
          void instproxy_client_free(void* a) {}
          void heartbeat_client_start_service(void* a, void* b, void** c) {}
          void heartbeat_client_free(void* a) {}
          void heartbeat_send(void* a, void* b) {}
          void heartbeat_receive(void* a, void* b, void* c) {}
          void idevice_init(void) {}
          void idevice_free(void* a) {}
          void idevice_new(void* a, void** b) {}
          void idevice_connect(void* a, int b, void** c) {}
          void idevice_disconnect(void* a) {}
          void lockdownd_client_new_with_handshake(void* a, void** b, void* c) {}
          void lockdownd_client_free(void* a) {}
          void lockdownd_start_service(void* a, void* b, void** c) {}
          void lockdownd_get_value(void* a, void* b, void* c, void** d) {}
          void rsd_client_connect(void* a, int b, void** c) {}
          void rsd_client_disconnect(void* a) {}
          void rsd_handshake_free(void* a) {}
          void getPairingRsd(void* a, void** b) {}
          void plist_to_xml(void* a, void** b, void* c) {}
          void rp_pairing_file_free(void* a) {}
          void rp_pairing_file_read(void* a, void** b) {}
          EOF
          
          clang -target arm64-apple-ios16.0 \
            -isysroot $(xcrun --sdk iphoneos --show-sdk-path) \
            -c /tmp/dummy.c -o /tmp/dummy.o
          ar rcs "$TARGET_LIB" /tmp/dummy.o
          echo "Done: $(file $TARGET_LIB)"

      - name: Fix Deployment Target
        run: |
          cd OriginalFeather
          sed -i '' 's/IPHONEOS_DEPLOYMENT_TARGET = 18.2/IPHONEOS_DEPLOYMENT_TARGET = 16.0/g' Feather.xcodeproj/project.pbxproj
          sed -i '' 's/IPHONEOS_DEPLOYMENT_TARGET = 18.0/IPHONEOS_DEPLOYMENT_TARGET = 16.0/g' Feather.xcodeproj/project.pbxproj

      - name: Compile Feather
        run: |
          cd OriginalFeather
          mkdir -p ../upload

          xcodebuild -scheme Feather \
            -configuration Release \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            -derivedDataPath build \
            -skipPackagePluginValidation \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            AD_HOC_CODE_SIGNING_ALLOWED=YES \
            ARCHS=arm64 \
            ONLY_ACTIVE_ARCH=NO \
            build

          APP_PATH=$(find build -name "*.app" -path "*/Release-iphoneos/*" | head -1)

          if [ -n "$APP_PATH" ]; then
            mkdir -p Payload
            cp -r "$APP_PATH" Payload/
            zip -r ../upload/Feather.ipa Payload/
            rm -rf Payload
          else
            echo "No .app found!"
            exit 1
          fi

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: AppMaster Release v${{ github.run_number }}
          tag_name: v${{ github.run_number }}
          files: upload/*.ipa
          generate_release_notes: true
          fail_on_unmatched_files: false
          draft: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}