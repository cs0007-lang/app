name: Create New Release

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15
    permissions:
      contents: write
    steps:
      - name: Setup Xcode Version
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '16.2'

      - name: Clone Original Feather with submodules
        run: |
          git config --global lfs.enabled false
          git config --global filter.lfs.smudge "git-lfs smudge --skip -- %f"
          git config --global filter.lfs.process "git-lfs filter-process --skip"
          git clone --recurse-submodules https://github.com/khcrysalis/Feather.git OriginalFeather

      - name: Compile Feather
        run: |
          cd OriginalFeather
          mkdir -p ../upload
          xcodebuild -scheme Feather \
            -configuration Release \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            ARCHS=arm64
          find build -name "*.app" -path "*/Release-iphoneos/*" | head -1 | xargs -I{} xcrun PackageApplication "{}" -o "$(pwd)/../upload/Feather.ipa" || true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: AppMaster Release v${{ github.run_number }}
          tag_name: v${{ github.run_number }}
          files: upload/*.ipa
          generate_release_notes: true
          fail_on_unmatched_files: false
          draft: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}rets.GITHUB_TOKEN }}