name: iOS Build and Archive

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: macos-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Select Xcode version
      run: sudo xcode-select -s /Applications/Xcode_16.2.app

    - name: Clone Feather
      run: |
        git config --global lfs.enabled false
        git clone --recurse-submodules https://github.com/khcrysalis/Feather.git Feather-2.7.0

    - name: Show Feather Structure
      run: |
        echo "=== Root ==="
        ls Feather-2.7.0/
        echo "=== Submodules ==="
        ls Feather-2.7.0/IDeviceKitten/ 2>/dev/null || echo "No IDeviceKitten"
        echo "=== All frameworks ==="
        find Feather-2.7.0 -name "*.xcframework" 2>/dev/null
        find Feather-2.7.0 -name "*.a" 2>/dev/null

    - name: Build and Archive iOS App
      run: |
        xcodebuild clean archive \
          -project Feather-2.7.0/Feather.xcodeproj \
          -scheme Feather \
          -configuration Release \
          -archivePath build/AppMaster.xcarchive \
          -sdk iphoneos \
          -skipPackagePluginValidation \
          -skipMacroValidation \
          CODE_SIGNING_ALLOWED=NO \
          CODE_SIGNING_REQUIRED=NO \
          AD_HOC_CODE_SIGNING_ALLOWED=YES \
          ARCHS=arm64 \
          ONLY_ACTIVE_ARCH=NO \
          ENABLE_BITCODE=NO

    - name: Export IPA
      run: |
        mkdir -p build/ipa/Payload
        cp -r build/AppMaster.xcarchive/Products/Applications/*.app build/ipa/Payload/
        cd build/ipa
        zip -r AppMaster.ipa Payload/

    - name: Upload IPA as artifact
      uses: actions/upload-artifact@v4
      with:
        name: AppMaster-IPA
        path: build/ipa/AppMaster.ipa