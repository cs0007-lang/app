name: iOS Build and Archive

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: macos-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Select Xcode version
      run: sudo xcode-select -s /Applications/Xcode_16.2.app

    - name: Clone Feather
      run: |
        git config --global lfs.enabled false
        git clone --recurse-submodules https://github.com/khcrysalis/Feather.git Feather-2.7.0

    - name: Build and Archive iOS App
      run: |
        set -o pipefail  # ✅ FIX 1: يجعل الـ pipe يفشل إذا فشل xcodebuild
        xcodebuild clean archive \
          -project Feather-2.7.0/Feather.xcodeproj \
          -scheme Feather \
          -configuration Release \
          -archivePath build/AppMaster.xcarchive \
          -sdk iphoneos \
          -skipPackagePluginValidation \
          -skipMacroValidation \
          -skipPackageUpdates \
          CODE_SIGNING_ALLOWED=NO \
          CODE_SIGNING_REQUIRED=NO \
          AD_HOC_CODE_SIGNING_ALLOWED=YES \
          ARCHS=arm64 \
          ONLY_ACTIVE_ARCH=NO \
          ENABLE_BITCODE=NO \
          2>&1 | tee build.log | tail -100  # ✅ FIX 2: tee يحفظ الـ log كاملاً

    - name: Upload build log on failure  # ✅ FIX 3: ارفع الـ log عند الفشل
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: build-log
        path: build.log

    - name: Verify archive exists  # ✅ FIX 4: تحقق من وجود الـ archive قبل المتابعة
      run: |
        if [ ! -d "build/AppMaster.xcarchive" ]; then
          echo "❌ Archive not found! Build may have failed silently."
          exit 1
        fi
        echo "✅ Archive found:"
        ls -la build/AppMaster.xcarchive/Products/Applications/

    - name: Export IPA
      run: |
        mkdir -p build/ipa/Payload
        cp -r build/AppMaster.xcarchive/Products/Applications/*.app build/ipa/Payload/
        cd build/ipa
        zip -r AppMaster.ipa Payload/

    - name: Upload IPA as artifact
      uses: actions/upload-artifact@v4
      with:
        name: AppMaster-IPA
        path: build/ipa/AppMaster.ipa