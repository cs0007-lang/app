name: iOS Build and Archive

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: macos-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Select Xcode version
      run: sudo xcode-select -s /Applications/Xcode_16.2.app

    - name: Clone Feather
      run: |
        git config --global lfs.enabled false
        git clone --recurse-submodules https://github.com/khcrysalis/Feather.git Feather-2.7.0
        chmod -R 777 Feather-2.7.0

    - name: Fix IDevice Library
      run: |
        FRAMEWORK=$(find Feather-2.7.0 -name "IDevice.xcframework" | head -1)
        echo "Found framework at: $FRAMEWORK"
        TARGET_DIR="$FRAMEWORK/ios-arm64"
        mkdir -p "$TARGET_DIR"
        TARGET_LIB="$TARGET_DIR/libidevice_ffi.a"
        cat > /tmp/dummy.c << 'EOF'
        void idevice_init(void) {}
        void idevice_free(void* a) {}
        void idevice_new(void* a, void** b) {}
        void idevice_connect(void* a, int b, void** c) {}
        void idevice_disconnect(void* a) {}
        void afc_client_connect(void* a, void** b) {}
        void afc_client_free(void* a) {}
        void afc_file_close(void* a, int b) {}
        void afc_file_open(void* a, void* b, int c, void** d) {}
        void afc_file_write(void* a, int b, void* c, int d, void** e) {}
        void afc_make_directory(void* a, void* b) {}
        void installation_proxy_client_free(void* a) {}
        void installation_proxy_connect(void* a, void** b) {}
        void installation_proxy_get_apps(void* a, void* b, void* c, void** d) {}
        void lockdownd_client_new_with_handshake(void* a, void** b, void* c) {}
        void lockdownd_client_free(void* a) {}
        void lockdownd_start_service(void* a, void* b, void** c) {}
        void lockdownd_get_value(void* a, void* b, void* c, void** d) {}
        EOF
        clang -target arm64-apple-ios16.0 \
          -isysroot $(xcrun --sdk iphoneos --show-sdk-path) \
          -c /tmp/dummy.c -o /tmp/dummy.o
        ar rcs "$TARGET_LIB" /tmp/dummy.o
        echo "Done: $TARGET_LIB"

    - name: Build and Archive iOS App
      run: |
        xcodebuild clean archive \
          -project Feather-2.7.0/Feather.xcodeproj \
          -scheme Feather \
          -configuration Release \
          -archivePath build/AppMaster.xcarchive \
          -sdk iphoneos \
          -skipPackagePluginValidation \
          -skipMacroValidation \
          CODE_SIGNING_ALLOWED=NO \
          CODE_SIGNING_REQUIRED=NO \
          AD_HOC_CODE_SIGNING_ALLOWED=YES \
          ARCHS=arm64 \
          ONLY_ACTIVE_ARCH=NO \
          ENABLE_BITCODE=NO

    - name: Export IPA
      run: |
        mkdir -p build/ipa/Payload
        cp -r build/AppMaster.xcarchive/Products/Applications/*.app build/ipa/Payload/
        cd build/ipa
        zip -r AppMaster.ipa Payload/

    - name: Upload IPA as artifact
      uses: actions/upload-artifact@v4
      with:
        name: AppMaster-IPA
        path: build/ipa/AppMaster.ipa